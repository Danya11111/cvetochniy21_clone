# CI + деплой по SSH (rsync). Secrets: DEPLOY_HOST, DEPLOY_USER, DEPLOY_PORT, DEPLOY_PATH, DEPLOY_SSH_KEY.
name: Deploy via SSH

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
      DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4.3.1

      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies (CI)
        shell: bash
        run: |
          set -euo pipefail
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Test
        shell: bash
        run: npm test

      - name: Validate deploy secrets
        shell: bash
        run: |
          set -euo pipefail
          : "${DEPLOY_HOST:?Missing required secret: DEPLOY_HOST}"
          : "${DEPLOY_USER:?Missing required secret: DEPLOY_USER}"
          : "${DEPLOY_PORT:?Missing required secret: DEPLOY_PORT}"
          : "${DEPLOY_PATH:?Missing required secret: DEPLOY_PATH}"
          : "${DEPLOY_SSH_KEY:?Missing required secret: DEPLOY_SSH_KEY}"
          if ! [[ "${DEPLOY_PORT}" =~ ^[0-9]+$ ]] || [ "${DEPLOY_PORT}" -le 0 ]; then
            echo "DEPLOY_PORT must be a positive integer (e.g. 22)" >&2
            exit 1
          fi
          if [ "${DEPLOY_PATH:0:1}" != "/" ]; then
            echo "DEPLOY_PATH must be an absolute path, for example /var/www/cvetochniy21" >&2
            exit 1
          fi
          if [ "$DEPLOY_PATH" = "/" ]; then
            echo "DEPLOY_PATH must not be the filesystem root /" >&2
            exit 1
          fi
          if ! printf '%s' "$DEPLOY_SSH_KEY" | grep -q 'BEGIN'; then
            echo "DEPLOY_SSH_KEY is invalid: expected a private key header (BEGIN ...). Value is not printed." >&2
            exit 1
          fi
          if ! printf '%s' "$DEPLOY_SSH_KEY" | grep -q 'PRIVATE KEY'; then
            echo "DEPLOY_SSH_KEY is invalid: expected PRIVATE KEY in PEM/OpenSSH key. Value is not printed." >&2
            exit 1
          fi
          echo "Deploy secrets present and DEPLOY_PATH shape validated (values not shown)."

      - name: Configure SSH
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$DEPLOY_PORT" "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Prepare remote directory
        shell: bash
        run: |
          set -euo pipefail
          DEPLOY_PATH_Q="$(printf '%q' "$DEPLOY_PATH")"
          printf '%s\n' \
            'set -euo pipefail' \
            ': "${DEPLOY_PATH:?DEPLOY_PATH is required on remote}"' \
            'mkdir -p "$DEPLOY_PATH"' \
            'test -w "$DEPLOY_PATH"' | \
            ssh -i ~/.ssh/deploy_key -p "$DEPLOY_PORT" -o StrictHostKeyChecking=yes \
              "${DEPLOY_USER}@${DEPLOY_HOST}" \
              "DEPLOY_PATH=${DEPLOY_PATH_Q} bash -se"

      - name: Rsync to server
        shell: bash
        run: |
          set -euo pipefail
          RSYNC_RSH="ssh -i ~/.ssh/deploy_key -p ${DEPLOY_PORT} -o StrictHostKeyChecking=yes"
          DEST="${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_PATH}/"
          rsync -avz \
            -e "$RSYNC_RSH" \
            --include '.env.example' \
            --exclude '.git/' \
            --exclude '.github/' \
            --exclude 'node_modules/' \
            --exclude '.env' \
            --exclude '.env.*' \
            --exclude 'backend/database.sqlite' \
            --exclude 'database.sqlite' \
            --exclude '*.sqlite' \
            --exclude '*.sqlite3' \
            --exclude '*.db' \
            --exclude '*.db-shm' \
            --exclude '*.db-wal' \
            --exclude 'backups/' \
            --exclude '*.dump' \
            --exclude '*.sql' \
            --exclude '*.tar.gz' \
            --exclude 'backend/data/promotion-uploads/' \
            --exclude 'logs/' \
            --exclude '*.log' \
            "./" "${DEST}"

      - name: Install production dependencies and restart
        shell: bash
        run: |
          set -euo pipefail
          DEPLOY_PATH_Q="$(printf '%q' "$DEPLOY_PATH")"
          ssh -i ~/.ssh/deploy_key -p "$DEPLOY_PORT" -o StrictHostKeyChecking=yes \
            "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "DEPLOY_PATH=${DEPLOY_PATH_Q} bash -se" < scripts/gha-remote-post-rsync.sh

      - name: Optional health probe (non-blocking)
        shell: bash
        run: |
          set -euo pipefail
          DEPLOY_PATH_Q="$(printf '%q' "$DEPLOY_PATH")"
          ssh -i ~/.ssh/deploy_key -p "$DEPLOY_PORT" -o StrictHostKeyChecking=yes \
            "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "DEPLOY_PATH=${DEPLOY_PATH_Q} bash -se" < scripts/gha-remote-healthcheck-soft.sh
