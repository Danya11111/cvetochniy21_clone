# Example nginx vhost: Mini App + admin UI — всё через reverse proxy к Node (Express).
# Скопируйте и адаптируйте под свой сервер (ssl_certificate, server_name, upstream порт).
#
# === PRODUCTION ROUTING CONTRACT (канон) ===
# Весь HTML и API — только через proxy_pass на Node. Запрещено для storefront/admin HTML:
#   root /path/to/repo/frontend;
#   alias /path/to/repo/frontend/;
# иначе отдаётся сырой шаблон без injectHtmlBuildStamp (__F21_BUILD__), рассинхрон с /app.<build>.js.
#
# Таблица путей (все — на один upstream):
#   /api/                     JSON API, GET /api/health/ops — диагностика
#   /, /index.html            storefront после inject
#   /admin-launch             POST handoff
#   /admin-embed, /admin      admin UI
#   /admin-assets/            статика админки
#   /app.<build>.js, /styles.<build>.css  versioned storefront assets
#
# Legacy / not supported: раздача только *.js/*.css с диска без Node для HTML — не поддерживается.
#
# Канон в git: deploy/PRODUCTION-SOURCE-OF-TRUTH-ru.md

upstream f21_node_upstream {
    server 127.0.0.1:3000;
    keepalive 32;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name example.tgtsvetochnii21.ru;

    # ssl_certificate     /path/to/fullchain.pem;
    # ssl_certificate_key /path/to/privkey.pem;

    add_header X-Content-Type-Options nosniff always;

    # Канонические поверхности приложения (все — proxy_pass к Node):
    #   /  и /index.html        — storefront HTML + SPA
    #   /admin-launch           — POST handoff
    #   /admin-embed, /admin    — admin HTML (если включено в приложении)
    #   /admin-assets/          — статика админки (реальные файлы app.js/styles.css + versioned URLs)
    #   /app.<build>.js, /styles.<build>.css — versioned storefront assets
    #   /api/                   — JSON API
    #
    # Один location / достаточно, если Node обрабатывает все пути; явные блоки ниже — для читаемости
    # и при необходимости разных таймаутов (оставлены как комментарий).

    # location = / { proxy_pass http://f21_node_upstream; }
    # location = /index.html { proxy_pass http://f21_node_upstream; }
    # location = /admin-launch { proxy_pass http://f21_node_upstream; }
    # location /admin-embed { proxy_pass http://f21_node_upstream; }
    # location /admin-assets/ { proxy_pass http://f21_node_upstream; }
    # location ~* ^/app\.[^/]+\.js$ { proxy_pass http://f21_node_upstream; }
    # location ~* ^/styles\.[^/]+\.css$ { proxy_pass http://f21_node_upstream; }
    # location /api/ { proxy_pass http://f21_node_upstream; }

    location / {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_pass http://f21_node_upstream;
    }
}

