# Тестовый vhost: arhipovdan.ru — весь трафик на Node (Express), не статикой с диска.
# До certbot: один server :80. После `certbot --nginx` появятся listen 443 ssl и сертификаты.
# GET /api/health/ops должен отвечать JSON (маршрут в Node, до SPA-fallback).
#
# Требуется: Node на 127.0.0.1:3000 (LISTEN_HOST, PORT в /etc/cvetochny21.env).

server {
    listen 80;
    listen [::]:80;
    server_name arhipovdan.ru www.arhipovdan.ru;

    add_header X-Content-Type-Options nosniff always;

    location / {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_pass http://127.0.0.1:3000;
    }
}

